<div class="kitchen-dashboard">
  <header class="kitchen-header">
    <div class="brand-info">
      <img src="assets/logoprimereserve.png" alt="Logo" class="nav-logo">
      <h2 class="role-badge">PANEL COCINA</h2>
    </div>
    <button (click)="cerrarSesion()" class="btn-logout">SALIR</button>
  </header>

  <main class="dashboard-content">
    <div *ngIf="router.url === '/cocina'" class="menu-grid">
      <h1 class="main-title">Control de Producción</h1>
      <div class="actions-container">
        <button routerLink="pedidos" class="card-btn">LISTA DE PEDIDOS</button>
        <button routerLink="actualizar-menu" class="card-btn">ACTUALIZAR MENÚ</button>
      </div>
    </div>
    <router-outlet></router-outlet>
  </main>
</div>
