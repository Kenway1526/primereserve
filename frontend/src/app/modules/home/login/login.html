<div class="login-wrapper">
  <div class="login-box">
    <div class="brand">
      <img src="assets/LOGO IS.png" alt="Logo" class="main-logo">
      <h1>PRIME RESERVE</h1>
      <span>EXPERIENCIA EXCLUSIVA</span>
    </div>

    <form (ngSubmit)="onLogin()" #f="ngForm">
      <div class="input-group">
        <label>Email Institucional</label>
        <input 
          type="email" 
          name="email" 
          [(ngModel)]="credentials.email" 
          placeholder="usuario@primereserve.com"
          required>
      </div>

      <div class="input-group">
        <label>Contraseña</label>
        <input 
          type="password" 
          name="password" 
          [(ngModel)]="credentials.password" 
          placeholder="••••••••"
          required>
      </div>

      <p class="error-text" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" class="btn-primary" [disabled]="isLoading">
        <span *ngIf="!isLoading">ACCEDER</span>
        <div class="spinner" *ngIf="isLoading"></div>
      </button>

      <div class="footer-links">
        <p>¿Eres nuevo? <a routerLink="/home/register">Crea una cuenta</a></p>
      </div>
    </form>
  </div>
</div>
