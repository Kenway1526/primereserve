<div class="map-mgmt-container">
  
  <header class="map-header">
    <div class="title-area">
      <h1>Layout de Restaurante</h1>
      <div class="floor-tabs">
        <button [class.active]="currentFloor === 'PLANTA_BAJA'" (click)="currentFloor = 'PLANTA_BAJA'">PLANTA BAJA</button>
        <button [class.active]="currentFloor === 'TERRAZA'" (click)="currentFloor = 'TERRAZA'">TERRAZA</button>
      </div>
    </div>

    <div class="map-legend">
      <div class="legend-item"><span class="indicator libre"></span> Libre</div>
      <div class="legend-item"><span class="indicator ocupada"></span> Ocupada</div>
      <div class="legend-item"><span class="indicator reservada"></span> Reservada</div>
      <div class="legend-item"><span class="indicator sucia"></span> Sucia</div>
    </div>

    <button class="btn-primary-gold" (click)="openAddModal()">
      <span class="material-icons">add_circle</span> NUEVA MESA
    </button>
  </header>

      <div class="restaurant-floor" (dragover)="$event.preventDefault()">
        <div class="grid-pattern"></div>
        <div class="floor-watermark">{{ currentFloor === 'PLANTA_BAJA' ? 'PB' : 'T' }}</div>
        
        <div *ngFor="let table of filteredTables" 
        class="table-node" 
        [ngClass]="[table.estado.toLowerCase(), table.forma]"
        [style.left.px]="table.x"
        [style.top.px]="table.y"
        (click)="openEditModal(table)" 
        draggable="true"
        (dragend)="onDragEnd($event, table)">
      
      <div class="table-body">
        <span class="t-num">
          {{ table.zona === 'PLANTA_BAJA' ? 'PB' : 'T' }}-{{ table.numeroMesa | number:'2.0' }}
        </span>
        <div class="t-icons">
          <span class="material-icons">groups</span>{{ table.capacidad }}
        </div>
      </div>
    </div>
  </div>

  <app-modal [isOpen]="isModalOpen" [title]="'Configurar Mesa'" (close)="isModalOpen = false">
    <div class="table-config-form" *ngIf="selectedTable">
      
      <div class="form-row">
        <div class="field">
          <label>Número de Mesa (ID Visual)</label>
          <input type="number" [(ngModel)]="selectedTable.numeroMesa" class="dark-input">
        </div>
        <div class="field">
          <label>Capacidad (Máx. 10 PAX)</label>
          <input type="number" 
                 [(ngModel)]="selectedTable.capacidad" 
                 min="1" 
                 max="10" 
                 onkeypress="return event.charCode >= 48 && event.charCode <= 57"
                 class="dark-input">
          <small *ngIf="selectedTable.capacidad > 10" style="color: #d4af37; font-size: 10px; margin-top: 5px;">
            El límite máximo es 10 personas.
          </small>
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>Forma de la Mesa</label>
          <select [(ngModel)]="selectedTable.forma" class="dark-input">
            <option value="cuadrada">Cuadrada</option>
            <option value="circular">Circular</option>
          </select>
        </div>
        <div class="field">
          <label>Estado Actual</label>
          <select [(ngModel)]="selectedTable.estado" class="dark-input">
            <option value="LIBRE">Libre</option>
            <option value="OCUPADA">Ocupada</option>
            <option value="RESERVADA">Reservada</option>
            <option value="SUCIA">Sucia</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>Ubicación (Zona)</label>
          <input type="text" [value]="selectedTable.zona === 'PLANTA_BAJA' ? 'Planta Baja' : 'Terraza'" [disabled]="true" class="disabled-input">
        </div>
      </div>

      <button class="btn-save-table" 
              (click)="saveTable()" 
              [disabled]="isLoading">
        <span *ngIf="!isLoading">{{ selectedTable?.id ? 'ACTUALIZAR' : 'CONFIRMAR' }}</span>
        <span *ngIf="isLoading">PROCESANDO...</span>
      </button>

      <button *ngIf="selectedTable.id" 
              class="btn-delete-table" 
              (click)="deleteTable()"
              [disabled]="isLoading">
        <span class="material-icons">delete</span> ELIMINAR MESA
      </button>
    </div>
  </app-modal>

</div>
