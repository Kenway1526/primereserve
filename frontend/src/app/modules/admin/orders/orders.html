<div class="orders-page-container">
  
  <header class="main-header">
    <div class="gold-line"></div>
    <h1 class="text-white title-main">GESTIÓN DE ÓRDENES</h1>
  </header>

  <div class="orders-stack">
    <div class="ticket-card" *ngFor="let orden of ordenes">
      
      <div class="ticket-header">
        <div class="table-info">
          <h2 class="text-white">{{ orden.mesa }}</h2>
          <span class="text-gold sub-text">{{ orden.pedidos }} PEDIDO(S) ACUMULADOS</span>
        </div>
        <div class="status-pill" [attr.data-status]="orden.status">
          {{ orden.status }}
        </div>
      </div>

      <div class="ticket-body">
        <div class="item-row" *ngFor="let item of orden.items">
          <span class="text-white">{{ item.cant }}x {{ item.nombre }}</span>
          <div class="dots-spacer"></div>
          <span class="text-gold font-bold">${{ item.precio }}</span>
        </div>
      </div>

      <div class="ticket-footer">
        <div class="total-wrap">
          <small class="text-gold label-total">TOTAL ACUMULADO</small>
          <p class="text-gold amount-text">${{ orden.total }}</p>
        </div>
        <div class="logs-wrap">
          <span class="text-muted" *ngFor="let log of orden.logs">{{ log }}</span>
        </div>
      </div>

    </div>
  </div>

</div>
